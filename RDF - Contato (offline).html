document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-space-4xl:128px;\n\n  --radius-pill:999px; --radius-input:8px; --radius-button:10px;\n  --radius-card-sm:12px; --radius-card:14px; --radius-card-lg:16px;\n\n  --shadow-sm:0 1px 0 rgba(255,255,255,.04) inset,0 1px 2px rgba(0,0,0,.25);\n  --shadow-md:0 10px 30px rgba(0,0,0,.30),0 1px 0 rgba(255,255,255,.5) inset;\n  --shadow-lg:0 16px 36px rgba(0,0,0,.32),0 1px 0 rgba(255,255,255,.55) inset;\n\n  --container-max:1280px; --grid-cols:12; --grid-gap:24px;\n  --header-h:80px; --header-h-scrolled:64px;\n  --icon-sm:16px; --icon-md:20px; --icon-lg:24px; --icon-xl:32px; --icon-stroke:2;\n\n  --duration-fast:150ms; --duration-base:250ms; --duration-slow:400ms;\n  --ease-standard:cubic-bezier(.4,0,.2,1);\n  --ease-out:cubic-bezier(.2,.7,.2,1);\n  --ease-in:cubic-bezier(.4,0,1,1);\n}\n\n*{box-sizing:border-box}\nhtml{scroll-behavior:smooth;scroll-padding-top:96px}\nbody{\n  margin:0;font-family:var(--font-sans);color:var(--neutral-300);\n  background:var(--page-base);-webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;font-synthesis:none;overflow-x:hidden;\n}\n.surface{background:radial-gradient(135% 120% at 14% 8%, #1B2C49 0%, #122139 46%, #0C1828 100%);}\nimg{max-width:100%}\n\n/* container */\n.container-rdf{width:100%;max-width:var(--container-max);margin-inline:auto;padding-inline:20px}\n@media(min-width:480px){.container-rdf{padding-inline:24px}}\n@media(min-width:768px){.container-rdf{padding-inline:32px}}\n@media(min-width:1024px){.container-rdf{padding-inline:48px}}\n@media(min-width:1280px){.container-rdf{padding-inline:64px}}\n\n/* tipografia */\n.t-display{font-size:clamp(40px,6.2vw,64px);line-height:1.05;font-weight:800;letter-spacing:-.022em;color:#fff;text-wrap:balance}\n.t-h1{font-size:clamp(34px,5vw,48px);line-height:1.10;font-weight:800;letter-spacing:-.020em;color:#fff;text-wrap:balance}\n.t-h2{font-size:clamp(28px,3.6vw,36px);line-height:1.15;font-weight:700;letter-spacing:-.018em;color:#fff;text-wrap:balance}\n.t-h3{font-size:clamp(22px,2.4vw,28px);line-height:1.25;font-weight:700;letter-spacing:-.010em;color:#fff}\n.t-h4{font-size:22px;line-height:1.30;font-weight:700;letter-spacing:-.005em;color:#fff}\n.t-bodylg{font-size:clamp(18px,1.6vw,20px);line-height:1.5;font-weight:500;color:var(--neutral-200)}\n.t-body{font-size:17px;line-height:1.6;font-weight:400;color:var(--neutral-300)}\n.t-caption{font-size:14px;line-height:1.5;font-weight:500;color:var(--neutral-500)}\n.accent{color:var(--brand-primary)}\n.lead-it{font-style:italic;font-weight:500;color:var(--neutral-200);line-height:1.5}\n\n/* eyebrow */\n.eyebrow{display:inline-flex;align-items:center;gap:15px;color:var(--brand-primary);\n  font-size:13px;font-weight:600;letter-spacing:.28em;text-transform:uppercase}\n.eyebrow::before{content:\"\";width:34px;height:2px;background:var(--brand-primary);flex:none}\n.eyebrow.bare::before{display:none}\n.eyebrow.bare{gap:0}\n\n/* pílulas */\n.pill{display:inline-flex;align-items:center;border:1px solid rgba(45,212,191,.42);color:var(--brand-primary);\n  border-radius:var(--radius-pill);padding:7px 15px;font-size:12px;font-weight:600;letter-spacing:.10em;\n  text-transform:uppercase;white-space:nowrap;transition:box-shadow var(--duration-fast) var(--ease-standard),border-color var(--duration-fast) var(--ease-standard)}\n.pill:hover{box-shadow:0 0 0 3px var(--brand-primary-soft);border-color:var(--brand-primary)}\n.pill.solid{background:var(--brand-primary-soft);border-color:transparent}\n\n/* botões */\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:var(--radius-button);\n  border:1px solid transparent;cursor:pointer;text-decoration:none;\n  transition:background var(--duration-fast) var(--ease-standard),border-color var(--duration-fast) var(--ease-standard),\n    box-shadow var(--duration-fast) var(--ease-standard),transform var(--duration-fast) var(--ease-standard),color var(--duration-fast) var(--ease-standard)}\n.btn-sm{padding:8px 16px;font-size:14px;min-height:36px}\n.btn-md{padding:12px 24px;font-size:16px;min-height:48px}\n.btn-lg{padding:16px 32px;font-size:18px;min-height:56px}\n.btn-primary{background:var(--brand-primary);color:var(--ink)}\n.btn-primary:hover{background:var(--brand-primary-strong)}\n.btn-primary:active{transform:translateY(1px)}\n.btn-secondary{background:transparent;border-color:rgba(45,212,191,.5);color:var(--brand-primary)}\n.btn-secondary:hover{border-color:var(--brand-primary);background:rgba(45,212,191,.10)}\n.btn-secondary:active{background:rgba(45,212,191,.18)}\n.btn-tertiary{background:transparent;color:var(--brand-primary);padding-left:0;padding-right:0;gap:6px}\n.btn-tertiary:hover{color:var(--brand-primary-strong)}\n.btn-tertiary .arr{transition:transform var(--duration-fast) var(--ease-standard)}\n.btn-tertiary:hover .arr{transform:translateX(4px)}\n.btn-ghost{background:transparent;border-color:var(--neutral-line);color:#fff}\n.btn-ghost:hover{border-color:var(--brand-primary);color:var(--brand-primary)}\n\n/* cards */\n.card{background:var(--surface-panel);border:1px solid var(--neutral-line);border-radius:var(--radius-card);box-shadow:var(--shadow-sm)}\n.card.top{border-top:2px solid var(--brand-primary)}\n.card-link{transition:transform var(--duration-fast) var(--ease-standard),border-color var(--duration-fast) var(--ease-standard),box-shadow var(--duration-fast) var(--ease-standard)}\n.card-link:hover{transform:translateY(-2px);border-color:rgba(124,139,158,.34);box-shadow:var(--shadow-md)}\n\n.divider{height:1px;background:var(--neutral-line);width:100%}\n\n/* credential chip */\n.cred-chip{height:84px;background:#fff;border-radius:var(--radius-card-sm);padding:0 28px;display:flex;\n  align-items:center;justify-content:center;box-shadow:var(--shadow-md)}\n.cred-chip img{display:block;width:auto}\n\n/* client tile */\n.ctile{background:#fff;border-radius:var(--radius-card-lg);height:128px;padding:14px 22px;display:flex;\n  align-items:center;justify-content:center;box-shadow:var(--shadow-md)}\n.ctile img{display:block;width:auto;height:auto;max-width:86%;max-height:78px;object-fit:contain}\n.ctile img.c-innovate{max-height:96px;max-width:96px}\n.ctile img.c-rockit{max-height:98px;max-width:98px}\n.ctile img.c-siim{max-height:84px}\n.ctile img.c-ipc{max-height:90px}\n.ctile img.c-unika{max-height:92px}\n.ctile img.c-sangosse{max-height:90px}\n.ctile img.c-mynce{max-height:88px}\n.ctile img.c-quattro{max-height:92px;max-width:84%}\n.ctile img.c-madero{max-height:38px}\n.ctile img.c-luzzo{max-height:50px}\n\n/* photo placeholder */\n.photo-ph{position:relative;aspect-ratio:16/10;border-radius:var(--radius-card);overflow:hidden;\n  background:linear-gradient(150deg,#1a2b47 0%,#13243b 100%);border:1px solid var(--neutral-line);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:18px}\n.photo-ph .ic{color:var(--neutral-500)}\n.photo-ph .cap{font-size:13px;font-weight:600;color:var(--neutral-400)}\n.photo-ph .dim{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral-500)}\n\n/* foto real com véu navy */\n.photo-real{position:relative;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--neutral-line);background:var(--ink-2)}\n.photo-real img{display:block;width:100%;height:100%;object-fit:cover}\n.photo-real::after{content:\"\";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,21,36,.10) 0%,rgba(11,21,36,.45) 100%);pointer-events:none}\n\n/* ============================================================ HEADER ============================================================ */\n.site-header{position:sticky;top:0;z-index:100;height:var(--header-h);display:flex;align-items:center;\n  transition:height var(--duration-base) var(--ease-standard),background var(--duration-base) var(--ease-standard),\n    box-shadow var(--duration-base) var(--ease-standard),border-color var(--duration-base) var(--ease-standard);\n  border-bottom:1px solid transparent}\n.site-header.scrolled{height:var(--header-h-scrolled);background:rgba(11,21,36,.92);backdrop-filter:blur(10px);\n  -webkit-backdrop-filter:blur(10px);box-shadow:0 1px 2px rgba(0,0,0,.25);border-bottom-color:var(--neutral-line)}\n.brand-lockup{display:flex;align-items:center;gap:11px;text-decoration:none}\n.brand-lockup img{height:34px;width:auto;transition:height var(--duration-base) var(--ease-standard)}\n.scrolled .brand-lockup img{height:30px}\n.brand-word{font-weight:800;font-size:20px;letter-spacing:.02em;color:#fff;line-height:1}\n.brand-word .sub{display:block;font-size:8.5px;font-weight:700;letter-spacing:.24em;color:var(--neutral-400);margin-top:3px}\n\n.nav-link{font-size:16px;font-weight:600;color:var(--neutral-200);position:relative;padding:6px 0;text-decoration:none;\n  transition:color var(--duration-fast) var(--ease-standard)}\n.nav-link::after{content:\"\";position:absolute;left:0;right:0;bottom:-3px;height:2px;background:var(--brand-primary);\n  transform:scaleX(0);transform-origin:left;transition:transform var(--duration-base) var(--ease-out)}\n.nav-link:hover{color:#fff}\n.nav-link:hover::after,.nav-link[aria-current=\"page\"]::after{transform:scaleX(1)}\n.nav-link[aria-current=\"page\"]{color:#fff}\n\n/* seletor de idioma */\n.lang-switch{display:inline-flex;align-items:center;border:1px solid var(--neutral-line);border-radius:var(--radius-pill);\n  padding:3px;background:rgba(255,255,255,.03)}\n.lang-switch button{appearance:none;border:0;background:transparent;cursor:pointer;font:700 12px/1 var(--font-sans);\n  letter-spacing:.06em;color:var(--neutral-400);padding:6px 10px;border-radius:var(--radius-pill);\n  transition:color var(--duration-fast),background var(--duration-fast)}\n.lang-switch button[aria-pressed=\"true\"]{background:var(--brand-primary-soft);color:var(--brand-primary)}\n.lang-switch button:hover{color:#fff}\n\n/* mobile drawer */\n.drawer{position:fixed;inset:0;z-index:200;b
